<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer Ring -->
  <circle cx="12" cy="12" r="10" stroke="#212529" stroke-width="2.5" />
  
  <!-- Cardinal Ticks -->
  <path d="M12 2v2M12 20v2M2 12h2M20 12h2" stroke="#6C757D" stroke-width="2" />

  <!-- Needle Group -->
  <g>
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="45 12 12; 60 12 12; 30 12 12; 45 12 12"
      keyTimes="0; 0.3; 0.7; 1"
      dur="6s"
      repeatCount="indefinite" 
    />
    <!-- North (Blue) -->
    <path d="M12 4L15.5 12H8.5L12 4Z" fill="#007AFF" stroke="none" />
    <!-- South (Grey) -->
    <path d="M12 20L15.5 12H8.5L12 20Z" fill="#8E8E93" stroke="none" />
  </g>
</svg>